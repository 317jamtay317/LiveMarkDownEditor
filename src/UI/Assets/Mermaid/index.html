<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src data:;">
<script src="mermaid.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: "Segoe UI", system-ui, sans-serif; }
  #container { padding: 14px; display: inline-block; box-sizing: border-box; }
  #container svg { max-width: 100%; height: auto; }
  #message {
    padding: 18px; color: #8a8f98; font-size: 13px; line-height: 1.5;
    white-space: pre-wrap; display: none;
  }
  #message.error { color: #d1493f; }
</style>
</head>
<body>
<div id="container"></div>
<div id="message"></div>
<script>
  var sequence = 0;

  function applyTheme(dark) {
    document.body.style.background = dark ? '#1B1D21' : '#FFFFFF';
    mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: dark ? 'dark' : 'default' });
  }

  function showMessage(text, isError) {
    var container = document.getElementById('container');
    var message = document.getElementById('message');
    container.style.display = 'none';
    message.textContent = text;
    message.className = isError ? 'error' : '';
    message.style.display = 'block';
  }

  // Renders the given Mermaid source and returns the rendered size as a JSON string, so a headless
  // caller (the PDF image renderer) can size its capture to the diagram (INV-050).
  async function renderDiagram(source, dark) {
    applyTheme(dark);
    var container = document.getElementById('container');
    var message = document.getElementById('message');

    if (!source || !source.trim()) {
      showMessage('Place the caret in a mermaid diagram to preview it.', false);
      return JSON.stringify({ ok: false });
    }

    try {
      var result = await mermaid.render('diagram-' + (++sequence), source);
      container.innerHTML = result.svg;
      container.style.display = 'inline-block';
      message.style.display = 'none';
    } catch (error) {
      showMessage(String(error && error.message ? error.message : error), true);
      return JSON.stringify({ ok: false });
    }

    var svg = container.querySelector('svg');
    if (!svg) {
      return JSON.stringify({ ok: false });
    }

    var rect = svg.getBoundingClientRect();
    return JSON.stringify({ ok: true, width: Math.ceil(rect.width), height: Math.ceil(rect.height) });
  }
</script>
</body>
</html>
